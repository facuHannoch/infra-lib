name: {name}
# provider: azure        # cloud to deploy to (default: azure)
# location: CentralUS

# --- One machine (flat form — the common case) ------------------------------
# Everything below configures a single VM.

# VM size — pick ONE way:
vm: small               # preset: micro, small, medium, large
# cpu: 4                # ...or minimum specs (resolved to the cheapest matching size)
# ram: 16
# instance_type: Standard_D2s_v3   # ...or an exact provider size (skips resolution)

# gpu: a100             # request a GPU box — by type (t4, a10, a100) or count (gpu: 2).
#                       # The NVIDIA driver is installed automatically. GPU families
#                       # need quota: https://portal.azure.com (Quotas blade).

# storage: 30      # disk size in GB (default 30)
# port: 3000       # expose app port via reverse proxy (alias for `ports: [3000]`)

# ship:
#   - .            # directories to rsync to the VM
#   - ../my-lib

# setup:           # run once, must exit (install / build)
#   - sudo apt install -y unzip
#   - curl -fsSL https://bun.sh/install | bash
#   - cd /srv/files/my-lib && ~/.bun/bin/bun install

# start:           # long-running server, supervised by systemd (restarts on crash, survives reboot)
#   cd /srv/files/myapp && ~/.bun/bin/agents start-hub

# domain: myapp.example.com
# domain_strategy: own   # own or cloudflare

# --- Container workload (instead of ship/setup/start) -----------------------
# Run a container image rather than files-on-a-VM. Required by container hosts
# like RunPod (provider: runpod); also the way to run GPUs there.
#
# provider: runpod
# gpu: a40                       # RunPod GPU: a40, rtxa6000, l40s, l40, a100, h100
# image: ghcr.io/me/myapp:latest # ...prebuilt image (bring-your-image), OR:
# build: .                       # ...build the Dockerfile in this dir and push
# registry: ghcr.io/me           #    where `build` pushes (needs `docker login`)
# env:
#   MODEL: llama3
# start: python serve.py         # optional command override (container CMD)

# --- Several machines (nested form) -----------------------------------------
# Instead of the flat fields above, list machines by name. Each takes the same
# per-machine keys (vm/cpu/ram, storage, ports, ship, setup, start, domain).
#
# machines:
#   web:
#     vm: small
#     ports: [3000]
#     ship: [.]
#     domain: myapp.example.com
#   worker:
#     cpu: 4
#     ram: 16
#     start: ~/.bun/bin/bun run worker
