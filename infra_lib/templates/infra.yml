name: {name}
# type: vm               # vm (a box you fill) | pod (a container host like RunPod)
# provider: azure        # derived from type (vm->azure, pod->runpod) unless set
# location: CentralUS

# --- One unit (flat form — the common case) ---------------------------------
# Everything below configures a single unit. The deploy runs the same steps for
# every unit (create -> ship -> setup -> start -> expose -> health); steps that
# don't apply to the unit's type simply don't run.

# Size — pick ONE way:
size: small             # preset: micro, small, medium, large
# cpu: 4                # ...or minimum specs (resolved to the cheapest matching size)
# ram: 16
# instance_type: Standard_D2s_v3   # ...or an exact provider size (skips resolution)

# gpu: a100             # request a GPU. vm (Azure): t4, a10, a100 (driver auto-installed;
#                       #   GPU families need quota). pod (RunPod): a40, l40s, a100, h100.

# storage: 30      # disk / volume size in GB (default 30)
# port: 3000       # expose an app port (alias for `ports: [3000]`)

# env:             # environment variables (systemd Environment= on a vm, pod env)
#   MODEL: llama3  # secrets go here too

# --- vm unit: ship files, run commands, supervise a process -----------------
# ship:            # directories to rsync. `SRC` or `SRC:DEST` (DEST: absolute or ~-relative).
#   - .
#   - ../my-lib:/srv/lib/my-lib

# setup:           # run once, must exit (install / build). Runs wherever SSH is available.
#   - sudo apt install -y unzip
#   - curl -fsSL https://bun.sh/install | bash

# start: cd /srv/files/myapp && ~/.bun/bin/agents start-hub   # vm: systemd service

# domain: myapp.example.com
# domain_strategy: own   # own or cloudflare

# --- pod unit: boot a container image (RunPod) ------------------------------
# A pod boots from an image — set `type: pod` and one of image/build.
#
# type: pod
# gpu: a40
# image: ghcr.io/me/myapp:latest   # ...prebuilt image (bring-your-image), OR:
# build: .                         # ...build the Dockerfile in this dir and push
# registry: ghcr.io/me             #    where `build` pushes (needs `docker login`)
# start: python serve.py           # optional command override (container CMD)
# ship / setup also work on a pod when its image runs sshd (best-effort).

# --- Several units (nested form) --------------------------------------------
# Instead of the flat fields above, list units by name. Each takes the same
# per-unit keys.
#
# units:
#   web:
#     size: small
#     ports: [3000]
#     ship: [.]
#     domain: myapp.example.com
#   worker:
#     cpu: 4
#     ram: 16
#     start: ~/.bun/bin/bun run worker
